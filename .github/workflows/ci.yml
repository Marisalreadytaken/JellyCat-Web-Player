name: CI

on:
  pull_request:
  push:

jobs:
  spa:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
